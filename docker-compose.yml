services:
  web:
    build:
      context: .
      dockerfile: artifacts/tascalogo/Dockerfile
      platforms:
        - linux/amd64
    ports:
      - "3000:80"
    depends_on:
      - api

  migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      target: builder
      platforms:
        - linux/amd64
    environment:
      DATABASE_URL: postgresql://tascalogo:tascalogo_password@db:5432/tascalogo
    command: pnpm --filter @workspace/db run push-force
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      platforms:
        - linux/amd64
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: postgresql://tascalogo:tascalogo_password@db:5432/tascalogo
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tascalogo
      POSTGRES_USER: tascalogo
      POSTGRES_PASSWORD: tascalogo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tascalogo -d tascalogo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
