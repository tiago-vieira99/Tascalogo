services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=tiagoabvieira@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

  web:
    build:
      context: .
      dockerfile: artifacts/tascalogo/Dockerfile
      platforms:
        - linux/amd64
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tascalogo.rule=Host(`tascalogo.duckdns.org`)"
      - "traefik.http.routers.tascalogo.entrypoints=websecure"
      - "traefik.http.routers.tascalogo.tls.certresolver=letsencrypt"
      - "traefik.http.services.tascalogo.loadbalancer.server.port=80"

  migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      target: builder
      platforms:
        - linux/amd64
    environment:
      DATABASE_URL: postgresql://tascalogo:tascalogo_password@db:5432/tascalogo
    command: pnpm --filter @workspace/db run migrate
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      platforms:
        - linux/amd64
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: postgresql://tascalogo:tascalogo_password@db:5432/tascalogo
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_SECURE: "true"
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tascalogo
      POSTGRES_USER: tascalogo
      POSTGRES_PASSWORD: tascalogo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tascalogo -d tascalogo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  letsencrypt:
